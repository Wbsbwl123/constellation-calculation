  nativeZodiac: null,
  resultZodiac: null,
  scores: {},

  init: function() {
    var monthSel = document.getElementById('birth-month');
    var daySel = document.getElementById('birth-day');
    var self = this;
    
    monthSel.addEventListener('change', function() {
      self.updateDays();
      self.checkDate();
    });
    daySel.addEventListener('change', function() {
      self.checkDate();
    });
  },

  updateDays: function() {
    var month = parseInt(document.getElementById('birth-month').value);
    var daySel = document.getElementById('birth-day');
    var daysInMonth = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    var maxDay = month ? daysInMonth[month - 1] : 31;
    var currentVal = daySel.value;
    
    daySel.innerHTML = '<option value="">日</option>';
    for (var i = 1; i <= maxDay; i++) {
      daySel.innerHTML += '<option value="' + i + '">' + i + '日</option>';
    }
    if (currentVal && parseInt(currentVal) <= maxDay) {
      daySel.value = currentVal;
    }
  },

  getZodiacByDate: function(month, day) {
    var dates = [
      [1, 20, 'aquarius'], [2, 19, 'pisces'], [3, 21, 'aries'], [4, 20, 'taurus'],
      [5, 21, 'gemini'], [6, 22, 'cancer'], [7, 23, 'leo'], [8, 23, 'virgo'],
      [9, 23, 'libra'], [10, 24, 'scorpio'], [11, 23, 'sagittarius'], [12, 22, 'capricorn']
    ];
    for (var i = 0; i < dates.length; i++) {
      if (month === dates[i][0] && day < dates[i][1]) {
        return dates[(i + 11) % 12][2];
      }
    }
    return dates[dates.length - 1][2];
  },

  checkDate: function() {
    var month = parseInt(document.getElementById('birth-month').value);
    var day = parseInt(document.getElementById('birth-day').value);
    var el = document.getElementById('native-zodiac');
    var btn = document.getElementById('btn-start');
    
    console.log('checkDate called:', month, day);
    
    if (month && day) {
      var key = this.getZodiacByDate(month, day);
      this.nativeZodiac = key;
      var z = ZODIACS[key];
      el.innerHTML = '你的太阳星座是 <span class="zodiac-name">' + z.icon + ' ' + z.name + '</span>（' + z.date + '）';
      btn.disabled = false;
      console.log('Button enabled');
    } else {
      this.nativeZodiac = null;
      el.innerHTML = '';
      btn.disabled = true;
      console.log('Button disabled');
    }
  },

  showPage: function(id) {
    var pages = document.querySelectorAll('.page');
    for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  },

  startQuiz: function() {
    this.currentQ = 0;
    this.answers = new Array(20).fill(null);
    this.scores = {};
    this.showPage('page-quiz');
    this.renderQuestion();
  },

  renderQuestion: function() {
    var q = QUESTIONS[this.currentQ];
    document.getElementById('progress-text').textContent = (this.currentQ + 1) + ' / 20';
    document.getElementById('progress-fill').style.width = ((this.currentQ + 1) / 20 * 100) + '%';
    document.getElementById('question-text').textContent = q.q;

    var optList = document.getElementById('options-list');
    optList.innerHTML = '';
    var letters = ['A', 'B', 'C', 'D'];
    var self = this;
    
    for (var i = 0; i < q.opts.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'option-btn' + (this.answers[this.currentQ] === i ? ' selected' : '');
      btn.innerHTML = '<span class="option-letter">' + letters[i] + '</span><span>' + q.opts[i].text + '</span>';
      btn.onclick = (function(idx) {
        return function() { self.selectOption(idx); };
      })(i);
      optList.appendChild(btn);
    }

    document.getElementById('btn-prev').style.display = this.currentQ > 0 ? 'inline-flex' : 'none';
    var nextBtn = document.getElementById('btn-next');
    nextBtn.textContent = this.currentQ === 19 ? '查看结果' : '下一题';
    nextBtn.disabled = this.answers[this.currentQ] === null;
  },

  selectOption: function(idx) {
    this.answers[this.currentQ] = idx;
    var btns = document.querySelectorAll('.option-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
    btns[idx].classList.add('selected');
    document.getElementById('btn-next').disabled = false;
  },

  nextQuestion: function() {
    if (this.currentQ < 19) {
      this.currentQ++;
      this.renderQuestion();
    } else {
      this.calculateResult();
    }
  },

  prevQuestion: function() {
    if (this.currentQ > 0) {
      this.currentQ--;
      this.renderQuestion();
    }
  },

  calculateResult: function() {
    this.scores = {};
    var keys = Object.keys(ZODIACS);
    for (var k = 0; k < keys.length; k++) this.scores[keys[k]] = 0;

    for (var i = 0; i < this.answers.length; i++) {
      if (this.answers[i] !== null) {
        var optScores = QUESTIONS[i].opts[this.answers[i]].scores;
        var sk = Object.keys(optScores);
        for (var j = 0; j < sk.length; j++) {
          this.scores[sk[j]] += optScores[sk[j]];
        }
      }
    }

    var maxScore = 0;
    var maxKey = keys[0];
    for (var k = 0; k < keys.length; k++) {
      if (this.scores[keys[k]] > maxScore) {
        maxScore = this.scores[keys[k]];
        maxKey = keys[k];
      }
    }
    this.resultZodiac = maxKey;
    this.showResult();
  },

  getDimensionScores: function(zodiacKey) {
    var dimMap = {
      aries: [9, 6, 4, 3, 7, 3], taurus: [5, 4, 7, 5, 6, 9], gemini: [7, 9, 6, 3, 8, 3],
      cancer: [4, 5, 4, 9, 6, 7], leo: [8, 8, 4, 5, 8, 5], virgo: [6, 4, 9, 4, 5, 8],
      libra: [5, 8, 6, 6, 7, 6], scorpio: [7, 4, 7, 7, 6, 7], sagittarius: [8, 7, 5, 4, 7, 3],
      capricorn: [7, 3, 9, 3, 5, 9], aquarius: [6, 6, 8, 5, 9, 4], pisces: [3, 5, 3, 9, 9, 5]
    };
    return dimMap[zodiacKey] || [5, 5, 5, 5, 5, 5];
  },

  showResult: function() {
    this.showPage('page-result');
    var rz = ZODIACS[this.resultZodiac];
    var nz = this.nativeZodiac ? ZODIACS[this.nativeZodiac] : null;

    document.getElementById('result-icon').textContent = rz.icon;
    document.getElementById('result-zodiac-name').textContent = rz.icon + ' ' + rz.name;
    document.getElementById('result-match').textContent = '匹配度 ' + Math.min(98, Math.round(60 + this.scores[this.resultZodiac] * 1.2)) + '%';

    var compCard = document.getElementById('comparison-card');
    if (this.nativeZodiac && this.nativeZodiac !== this.resultZodiac) {
      compCard.innerHTML =
        '<div class="comparison-title">原生星座 vs 测算星座</div>' +
        '<div class="comparison-row">' +
          '<div class="comparison-zodiac"><div class="cz-icon">' + nz.icon + '</div><div class="cz-name">' + nz.name + '</div><div class="cz-label">你的原生星座</div></div>' +
          '<div class="comparison-vs">VS</div>' +
          '<div class="comparison-zodiac"><div class="cz-icon">' + rz.icon + '</div><div class="cz-name">' + rz.name + '</div><div class="cz-label">你更适合的星座</div></div>' +
        '</div>';
    } else if (this.nativeZodiac === this.resultZodiac) {
      compCard.innerHTML =
        '<div class="comparison-title">原生星座 vs 测算星座</div>' +
        '<div class="comparison-same">' + nz.icon + ' 你的性格和原生星座 ' + nz.name + ' 高度吻合！你就是典型的 ' + nz.name + '！</div>';
    } else {
      compCard.innerHTML =
        '<div class="comparison-title">测算结果</div>' +
        '<div class="comparison-same">' + rz.icon + ' 你更适合的星座是 ' + rz.name + '</div>';
    }

    var traitsCard = document.getElementById('traits-card');
    traitsCard.innerHTML = '<div class="traits-title">' + rz.icon + ' ' + rz.name + ' 的性格特征</div><ul class="traits-list">';
    for (var i = 0; i < rz.traits.length; i++) {
      traitsCard.innerHTML += '<li>' + rz.traits[i] + '</li>';
    }
    traitsCard.innerHTML += '</ul>';

    this.renderRadarChart();
    setTimeout(this.renderPoster.bind(this), 300);
  },

  renderRadarChart: function() {
    var nativeData = this.nativeZodiac ? this.getDimensionScores(this.nativeZodiac) : null;
    var resultData = this.getDimensionScores(this.resultZodiac);

    var seriesConfig = [{value: resultData, name: ZODIACS[this.resultZodiac].name + '（测算）', color: '#c9a96e'}];
    if (this.nativeZodiac && this.nativeZodiac !== this.resultZodiac) {
      seriesConfig.push({value: nativeData, name: ZODIACS[this.nativeZodiac].name + '（原生）', color: '#8a8680'});
    }

    var option = {
      animation: true,
      legend: {bottom: 0, textStyle: {color: '#8a8680', fontSize: 12}, itemWidth: 16, itemHeight: 8},
      radar: {
        indicator: [{name: '行动力', max: 10}, {name: '社交力', max: 10}, {name: '理性', max: 10}, {name: '感性', max: 10}, {name: '创造力', max: 10}, {name: '稳定性', max: 10}],
        shape: 'circle', splitNumber: 4, axisName: {color: '#8a8680', fontSize: 12},
        splitLine: {lineStyle: {color: '#e2dfdb'}}, splitArea: {show: false}, axisLine: {lineStyle: {color: '#e2dfdb'}}
      },
      series: [{
        type: 'radar',
        data: seriesConfig.map(function(s) {
          return {value: s.value, name: s.name, lineStyle: {color: s.color, width: 2}, areaStyle: {color: s.color + '33'}, itemStyle: {color: s.color}, symbol: 'circle', symbolSize: 6};
        })
      }]
    };

    var chartDom = document.getElementById('radarChart');
    var myChart = echarts.init(chartDom, null, {renderer: 'svg'});
    myChart.setOption(option);
    window.addEventListener('resize', function() { myChart.resize(); });
  },

  renderPoster: function() {
    var canvas = document.getElementById('posterCanvas');
    var ctx = canvas.getContext('2d');
    var w = 600, h = 900;
    canvas.width = w * 2; canvas.height = h * 2;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.scale(2, 2);

    ctx.fillStyle = '#faf9f7'; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#c9a96e'; ctx.fillRect(0, 0, w, 6);
    ctx.fillStyle = '#2c2c2c'; ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('你更适合哪个星座？', w / 2, 60);
    ctx.fillStyle = '#8a8680'; ctx.font = '14px sans-serif'; ctx.fillText('趣味性格测算', w / 2, 85);
    ctx.strokeStyle = '#e2dfdb'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(60, 110); ctx.lineTo(w - 60, 110); ctx.stroke();

    var rz = ZODIACS[this.resultZodiac];
    ctx.fillStyle = '#c9a96e'; ctx.font = '80px sans-serif'; ctx.fillText(rz.icon, w / 2, 220);
    ctx.fillStyle = '#2c2c2c'; ctx.font = 'bold 36px sans-serif'; ctx.fillText(rz.name, w / 2, 280);
    ctx.fillStyle = '#8a8680'; ctx.font = '16px sans-serif'; ctx.fillText('匹配度 ' + Math.min(98, Math.round(60 + this.scores[this.resultZodiac] * 1.2)) + '%', w / 2, 310);
    ctx.strokeStyle = '#e2dfdb'; ctx.beginPath(); ctx.moveTo(60, 340); ctx.lineTo(w - 60, 340); ctx.stroke();

    var y = 380;
    if (this.nativeZodiac && this.nativeZodiac !== this.resultZodiac) {
      var nz = ZODIACS[this.nativeZodiac];
      ctx.fillStyle = '#8a8680'; ctx.font = '12px sans-serif'; ctx.fillText('原生星座 VS 测算星座', w / 2, y);
      y += 40; ctx.font = '40px sans-serif'; ctx.fillStyle = '#8a8680'; ctx.fillText(nz.icon, w / 2 - 100, y);
      ctx.fillStyle = '#c9a96e'; ctx.fillText(rz.icon, w / 2 + 100, y);
      ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = '#8a8680'; ctx.fillText(nz.name, w / 2 - 100, y + 30);
      ctx.fillStyle = '#c9a96e'; ctx.fillText(rz.name, w / 2 + 100, y + 30);
      ctx.fillStyle = '#e2dfdb'; ctx.font = 'bold 14px sans-serif'; ctx.fillText('VS', w / 2, y + 15);
    } else if (this.nativeZodiac === this.resultZodiac) {
      ctx.fillStyle = '#c9a96e'; ctx.font = '16px sans-serif'; ctx.fillText('你的性格和原生星座 ' + rz.name + ' 高度吻合！', w / 2, y);
    }

    y = 500; ctx.strokeStyle = '#e2dfdb'; ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(w - 60, y); ctx.stroke();
    y += 30; ctx.fillStyle = '#2c2c2c'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('性格特征', w / 2, y);
    y += 30; ctx.font = '14px sans-serif'; ctx.fillStyle = '#2c2c2c';
    for (var i = 0; i < rz.traits.length; i++) ctx.fillText(rz.traits[i], w / 2, y + i * 28);
    ctx.strokeStyle = '#e2dfdb'; ctx.beginPath(); ctx.moveTo(60, h - 100); ctx.lineTo(w - 60, h - 100); ctx.stroke();
    ctx.fillStyle = '#8a8680'; ctx.font = '12px sans-serif'; ctx.fillText('来测测你更适合哪个星座吧', w / 2, h - 70);
    ctx.fillStyle = '#e2dfdb'; ctx.fillRect(w / 2 - 30, h - 60, 60, 60);
    ctx.fillStyle = '#8a8680'; ctx.font = '10px sans-serif'; ctx.fillText('扫码体验', w / 2, h - 25);
  },

  savePoster: function() {
    var canvas = document.getElementById('posterCanvas');
    var link = document.createElement('a');
    link.download = '星座测算结果.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    this.showToast('海报已保存');
  },

  copyResult: function() {
    var rz = ZODIACS[this.resultZodiac];
    var nz = this.nativeZodiac ? ZODIACS[this.nativeZodiac] : null;
    var text = '【你更适合哪个星座？】\n';
    if (nz) text += '我的原生星座：' + nz.icon + ' ' + nz.name + '\n';
    text += '我更适合的星座：' + rz.icon + ' ' + rz.name + '\n';
    text += '性格特征：' + rz.traits.join('、') + '\n';
    text += '来测测你更适合哪个星座吧！';

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(this.showToast.bind(this, '结果已复制到剪贴板'));
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      this.showToast('结果已复制到剪贴板');
    }
  },

  restart: function() {
    this.currentQ = 0; this.answers = new Array(20).fill(null);
    this.scores = {}; this.resultZodiac = null;
    this.showPage('page-welcome');
  },

  showToast: function(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg; toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }
};

// Initialize
app.init();
})();
</script>
</body>
</html>
